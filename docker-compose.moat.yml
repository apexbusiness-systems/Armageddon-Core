# ═══════════════════════════════════════════════════════════════════════════
# KINETIC ENGINE (MOAT) — Local Production Replica
# APEX Business Systems Ltd.
# ═══════════════════════════════════════════════════════════════════════════

services:
  # ─────────────────────────────────────────────────────────────────────────
  # KINETIC ENGINE WORKER
  # ─────────────────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: armageddon-core/Dockerfile
    image: armageddon-worker:${MOAT_VERSION:-latest}
    container_name: armageddon-worker-moat
    depends_on:
      temporal:
        condition: service_healthy
    env_file:
      - .env.moat
    environment:
      - NODE_ENV=production
      - SIM_MODE=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: always
    # Resource limits to mimic production constraints
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # ─────────────────────────────────────────────────────────────────────────
  # SUPPORT SERVICES
  # ─────────────────────────────────────────────────────────────────────────
  postgresql:
    image: postgres:15-alpine
    container_name: armageddon-postgres-moat
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-temporal}
      POSTGRES_DB: temporal
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U temporal" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: armageddon-temporal-moat
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-temporal}
      - POSTGRES_SEEDS=postgresql
      - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/config/dynamicconfig/development.yaml
    ports:
      - "127.0.0.1:7233:7233"
    healthcheck:
      test: [ "CMD", "tctl", "--address", "localhost:7233", "cluster", "health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  temporal-ui:
    image: temporalio/ui:2.26.2
    container_name: armageddon-temporal-ui-moat
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped

# ═══════════════════════════════════════════════════════════════════════════
# NAMED VOLUMES — persistent data survives container recreation
# ═══════════════════════════════════════════════════════════════════════════
volumes:
  postgres_data:
    driver: local

# ═══════════════════════════════════════════════════════════════════════════
# DOCKER SECRETS UPGRADE PATH (optional, for production hardening)
# ═══════════════════════════════════════════════════════════════════════════
# To migrate from env_file to Docker secrets:
#
# 1. Create secret files:
#    echo "your-service-role-key" | docker secret create supabase_service_role_key -
#    echo "your-pg-password"     | docker secret create postgres_password -
#
# 2. Add top-level secrets block:
#    secrets:
#      supabase_service_role_key:
#        external: true
#      postgres_password:
#        external: true
#
# 3. Reference in services:
#    worker:
#      secrets:
#        - supabase_service_role_key
#      environment:
#        - SUPABASE_SERVICE_ROLE_KEY_FILE=/run/secrets/supabase_service_role_key
#
#    postgresql:
#      secrets:
#        - postgres_password
#      environment:
#        - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
#
# Note: Docker secrets require Swarm mode. For standalone Compose, use
# file-based secrets with the "file:" directive instead of "external:".
