name: Deploy → Cloudflare Workers

# ═══════════════════════════════════════════════════════════════════════════
# ARMAGEDDON-CORE — Cloudflare Workers Deployment
# Serves armageddon.icu directly from Cloudflare — zero Vercel
# ═══════════════════════════════════════════════════════════════════════════

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: false

env:
  CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CF_API_TOKEN_ATS: ${{ secrets.CLOUDFLARE_API_TOKEN_ATS }}
  CF_AGENT_TOKEN: ${{ secrets.CLOUDFLARE_AGENT_TOKEN }}
  ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
  WORKER_NAME: armageddon-core
  ZONE_NAME: armageddon.icu

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      deployments: write

    steps:
      # ─── Checkout ─────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Node.js ──────────────────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ─── Install (postinstall builds @armageddon/shared) ──────────────
      - name: Install root dependencies
        run: npm ci

      - name: Verify shared lib build
        run: |
          ls packages/shared/dist/
          echo "✅ @armageddon/shared built"

      # ─── Build and deploy via the repo-owned Cloudflare cutover script ──
      - name: Build and deploy Cloudflare production edge
        working-directory: armageddon-site
        env:
          CLOUDFLARE_STATIC_EXPORT: "true"
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ARMAGEDDON_INTAKE_MIGRATION_APPLIED: ${{ secrets.SUPABASE_ARMAGEDDON_INTAKE_MIGRATION_APPLIED }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CF_ACCOUNT_ID }}
          CLOUDFLARE_ID: ${{ secrets.CLOUDFLARE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ env.CF_API_TOKEN }}
          CLOUDFLARE_API_TOKEN_ATS: ${{ env.CF_API_TOKEN_ATS }}
          CLOUDFLARE_AGENT_TOKEN: ${{ env.CF_AGENT_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ env.ZONE_ID }}
          CLOUDFLARE_WORKER_NAME: ${{ env.WORKER_NAME }}
          CLOUDFLARE_ZONE_NAME: ${{ env.ZONE_NAME }}
        run: npm run deploy:cloudflare

      - name: Verify static export manifest
        run: |
          test -f armageddon-site/out/index.html
          test -f armageddon-site/out/deployment.json
          python3 -m json.tool armageddon-site/out/deployment.json

      # ─── Smoke test ───────────────────────────────────────────────────
      - name: Smoke test
        run: |
          sleep 8
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "https://armageddon.icu" || echo "FAIL")
          echo "armageddon.icu → HTTP $HTTP"
          WWW=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "https://www.armageddon.icu" || echo "FAIL")
          echo "www.armageddon.icu → HTTP $WWW"
          curl -sSI --max-time 20 "https://armageddon.icu" | grep -i "x-armageddon-edge: cloudflare-workers"
          curl -sSI --max-time 20 "https://www.armageddon.icu" | grep -i "location: https://armageddon.icu"

      - name: ✅ Deployment summary
        if: always()
        run: |
          echo "══════════════════════════════════════════════════"
          echo "  ARMAGEDDON — CLOUDFLARE WORKERS DEPLOY"
          echo "══════════════════════════════════════════════════"
          echo "  Worker : $WORKER_NAME"
          echo "  Domain : $ZONE_NAME"
          echo "  Vercel : ZERO"
          echo "══════════════════════════════════════════════════"
