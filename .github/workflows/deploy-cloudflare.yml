name: Deploy → Cloudflare Workers

# ═══════════════════════════════════════════════════════════════════════════
# ARMAGEDDON-CORE — Cloudflare Workers Deployment
# Serves armageddontest.icu exclusively from Cloudflare Workers
# ═══════════════════════════════════════════════════════════════════════════

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: false

env:
  CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CF_AGENT_TOKEN: ${{ secrets.CLOUDFLARE_AGENT_TOKEN }}
  ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
  WORKER_NAME: armageddon-core
  WORKERS_DEV_HOST: armageddon-core.armageddon-test-suite-cert.workers.dev
  ZONE_NAME: armageddontest.icu

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Workers
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      deployments: write

    steps:
      # ─── Checkout ─────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Node.js ──────────────────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ─── Install (postinstall builds @armageddon/shared) ──────────────
      - name: Install root dependencies
        run: npm ci

      - name: Validate Production Environment
        working-directory: armageddon-site
        env:
          NEXT_PUBLIC_SITE_URL: https://armageddontest.icu
          # Same-origin backend: the Worker serves /api/* and the static assets
          # from this host. Must be present at BUILD time so Next inlines it into
          # the static export; otherwise isApiConfigured() is false and the
          # console locks every backed action (runs, gatekeeper, attestation).
          NEXT_PUBLIC_ARMAGEDDON_API_BASE: https://armageddon-exec-api.onrender.com
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || secrets.SUPABASE_URL || secrets.ARMAGEDDON_DB_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY || secrets.ARMAGEDDON_DB_ANON_KEY || secrets.SUPABASE_TOKEN }}
        run: npm run validate:production-env

      - name: Verify shared lib build
        run: |
          ls packages/shared/dist/
          echo "✅ @armageddon/shared built"

      # ─── Build and deploy via the repo-owned Cloudflare cutover script ──
      - name: Build and deploy Cloudflare production edge
        working-directory: armageddon-site
        env:
          CLOUDFLARE_STATIC_EXPORT: "true"
          NEXT_PUBLIC_SITE_URL: https://armageddontest.icu
          # Build-time backend origin baked into the static export. Without this,
          # the deployed bundle ships with no backend wired up — the console shows
          # "LOCKED / requires verified tier", runs cannot start, and the
          # attestation badge reads KEY_UNAVAILABLE, regardless of Worker secrets.
          NEXT_PUBLIC_ARMAGEDDON_API_BASE: https://armageddontest.icu
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || secrets.SUPABASE_URL || secrets.ARMAGEDDON_DB_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY || secrets.ARMAGEDDON_DB_ANON_KEY || secrets.SUPABASE_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.ARMAGEDDON_DB_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.ARMAGEDDON_DB_SERVICE_ROLE_KEY }}
          SUPABASE_ARMAGEDDON_INTAKE_MIGRATION_APPLIED: ${{ secrets.SUPABASE_ARMAGEDDON_INTAKE_MIGRATION_APPLIED }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CF_ACCOUNT_ID }}
          CLOUDFLARE_ID: ${{ secrets.CLOUDFLARE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ env.CF_API_TOKEN }}
          CLOUDFLARE_AGENT_TOKEN: ${{ env.CF_AGENT_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ env.ZONE_ID }}
          CLOUDFLARE_WORKER_NAME: ${{ env.WORKER_NAME }}
          CLOUDFLARE_ZONE_NAME: ${{ env.ZONE_NAME }}
          # armageddontest.icu has no www record; let the script auto-detect and skip it.
          CLOUDFLARE_INCLUDE_WWW: "false"
          # Manage DNS idempotently on every deploy (creates/updates proxied A records).
          CLOUDFLARE_MANAGE_DNS: "true"
        run: npm run deploy:cloudflare

      - name: Verify static export manifest
        run: |
          test -f armageddon-site/out/index.html
          test -f armageddon-site/out/deployment.json
          python3 -m json.tool armageddon-site/out/deployment.json

      # ─── Smoke test ───────────────────────────────────────────────────
      - name: Smoke test
        run: |
          set -euo pipefail
          sleep 8

          smoke_url() {
            local url="$1"
            local expected_host="$2"
            local headers
            headers="$(mktemp)"
            local http
            http="$(curl -sS -L -o /dev/null -D "$headers" -w "%{http_code}" --max-time 20 "$url" || echo "FAIL")"
            echo "$url → HTTP $http"

            if [ "$http" = "200" ]; then
              grep -qi "x-armageddon-edge: cloudflare-workers" "$headers"
              grep -qi "x-armageddon-canonical-host: $expected_host" "$headers"
              rm -f "$headers"
              return 0
            fi

            if [ "$http" = "403" ] && grep -qi "cf-mitigated: challenge" "$headers"; then
              echo "⚠️ Cloudflare security challenge is active for $url; treating protected edge as reachable."
              rm -f "$headers"
              return 0
            fi

            echo "❌ Expected 200 or Cloudflare challenge for $url, got $http"
            cat "$headers"
            rm -f "$headers"
            return 1
          }

          smoke_url "https://$ZONE_NAME" "$ZONE_NAME"
          smoke_url "https://$ZONE_NAME/intake/" "$ZONE_NAME"

          WORKERS_DEV_HTTP=$(curl -sS -L -o /dev/null -w "%{http_code}" --max-time 20 "https://$WORKERS_DEV_HOST" || echo "FAIL")
          echo "$WORKERS_DEV_HOST → HTTP $WORKERS_DEV_HTTP"
          [ "$WORKERS_DEV_HTTP" = "200" ] || { echo "❌ Expected Workers.dev 200, got $WORKERS_DEV_HTTP"; exit 1; }
          echo "✅ Smoke test passed"

      - name: ✅ Deployment summary
        if: always()
        run: |
          echo "══════════════════════════════════════════════════"
          echo "  ARMAGEDDON — CLOUDFLARE WORKERS DEPLOY"
          echo "══════════════════════════════════════════════════"
          echo "  Worker : $WORKER_NAME"
          echo "  Domain : https://$ZONE_NAME"
          echo "  Edge   : Cloudflare Workers (exclusive)"
          echo "══════════════════════════════════════════════════"
