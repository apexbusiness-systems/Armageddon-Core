name: Deploy → Cloudflare Workers

# ═══════════════════════════════════════════════════════════════════════════
# ARMAGEDDON-CORE — Cloudflare Workers Deployment
# Serves armageddon.icu directly from Cloudflare — zero Vercel
# ═══════════════════════════════════════════════════════════════════════════

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: false

env:
  CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN_ATS }}
  WORKER_NAME: armageddon-core
  ZONE_NAME: armageddon.icu

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      deployments: write

    steps:
      # ─── Checkout ─────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Node.js ──────────────────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ─── Install (postinstall builds @armageddon/shared) ──────────────
      - name: Install root dependencies
        run: npm ci

      - name: Verify shared lib build
        run: |
          ls packages/shared/dist/
          echo "✅ @armageddon/shared built"

      # ─── Build static export for Cloudflare ───────────────────────────
      - name: Build armageddon-site (static export)
        working-directory: armageddon-site
        env:
          CLOUDFLARE_STATIC_EXPORT: "true"
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run build

      - name: Verify static export
        run: |
          ls -la armageddon-site/out/
          COUNT=$(find armageddon-site/out -type f | wc -l)
          echo "✅ Static export: $COUNT files"
          test -f armageddon-site/out/index.html || (echo "❌ Missing index.html" && exit 1)

      # ─── Deploy worker (assets only — no routes in wrangler.jsonc) ────
      - name: Deploy worker to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ env.CF_API_TOKEN }}
          accountId: ${{ env.CF_ACCOUNT_ID }}
          workingDirectory: armageddon-site
          command: deploy
          wranglerVersion: "3.99.0"

      # ─── Wire armageddon.icu → worker via Cloudflare API ──────────────
      # Separated from wrangler deploy so Zone perms failure is non-fatal
      - name: Get Zone ID for armageddon.icu
        id: zone
        run: |
          RESPONSE=$(curl -s \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=$ZONE_NAME&status=active")
          ZONE_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'] if d.get('result') else '')" 2>/dev/null || true)
          if [ -z "$ZONE_ID" ]; then
            echo "⚠️  Zone $ZONE_NAME not found or no Zone:Read permission — skipping DNS wiring"
            echo "zone_id=" >> "$GITHUB_OUTPUT"
          else
            echo "✅ Zone ID: $ZONE_ID"
            echo "zone_id=$ZONE_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: Upsert proxied A record (root)
        if: steps.zone.outputs.zone_id != ''
        run: |
          ZONE_ID="${{ steps.zone.outputs.zone_id }}"
          # Check existing
          EXISTING=$(curl -s \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=A&name=$ZONE_NAME")
          RECORD_ID=$(echo "$EXISTING" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'] if d.get('result') else '')" 2>/dev/null || true)
          PAYLOAD='{"type":"A","name":"'"$ZONE_NAME"'","content":"192.0.2.1","ttl":1,"proxied":true}'
          if [ -n "$RECORD_ID" ]; then
            curl -s -X PATCH \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$RECORD_ID" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print('✅ A record updated' if d.get('success') else '⚠️ ' + str(d.get('errors')))"
          else
            curl -s -X POST \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print('✅ A record created' if d.get('success') else '⚠️ ' + str(d.get('errors')))"
          fi

      - name: Upsert proxied A record (www)
        if: steps.zone.outputs.zone_id != ''
        run: |
          ZONE_ID="${{ steps.zone.outputs.zone_id }}"
          WWW="www.$ZONE_NAME"
          EXISTING=$(curl -s \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=A&name=$WWW")
          RECORD_ID=$(echo "$EXISTING" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['result'][0]['id'] if d.get('result') else '')" 2>/dev/null || true)
          PAYLOAD='{"type":"A","name":"'"$WWW"'","content":"192.0.2.1","ttl":1,"proxied":true}'
          if [ -n "$RECORD_ID" ]; then
            curl -s -X PATCH \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$RECORD_ID" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print('✅ www A record updated' if d.get('success') else '⚠️ ' + str(d.get('errors')))"
          else
            curl -s -X POST \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" \
              "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print('✅ www A record created' if d.get('success') else '⚠️ ' + str(d.get('errors')))"
          fi

      - name: Register worker routes for armageddon.icu
        if: steps.zone.outputs.zone_id != ''
        run: |
          ZONE_ID="${{ steps.zone.outputs.zone_id }}"
          EXISTING=$(curl -s \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/workers/routes")
          PATTERNS=("$ZONE_NAME/*" "www.$ZONE_NAME/*")
          for PATTERN in "${PATTERNS[@]}"; do
            EXISTS=$(echo "$EXISTING" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          routes=[r['pattern'] for r in d.get('result',[])]
          print('yes' if '$PATTERN' in routes else 'no')
          " 2>/dev/null || echo "no")
            if [ "$EXISTS" = "yes" ]; then
              echo "✅ Route already registered: $PATTERN"
            else
              curl -s -X POST \
                -H "Authorization: Bearer $CF_API_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"pattern\":\"$PATTERN\",\"script\":\"$WORKER_NAME\"}" \
                "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/workers/routes" | \
                python3 -c "import sys,json; d=json.load(sys.stdin); print('✅ Route registered: $PATTERN' if d.get('success') else '⚠️ Route error: ' + str(d.get('errors')))"
            fi
          done

      # ─── Smoke test ───────────────────────────────────────────────────
      - name: Smoke test
        run: |
          sleep 8
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "https://armageddon.icu" || echo "FAIL")
          echo "armageddon.icu → HTTP $HTTP"
          WDEV=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 \
            "https://armageddon-core.${{ env.CF_ACCOUNT_ID }}.workers.dev" 2>/dev/null || echo "FAIL")
          echo "workers.dev preview → HTTP $WDEV"

      - name: ✅ Deployment summary
        if: always()
        run: |
          echo "══════════════════════════════════════════════════"
          echo "  ARMAGEDDON — CLOUDFLARE WORKERS DEPLOY"
          echo "══════════════════════════════════════════════════"
          echo "  Worker : $WORKER_NAME"
          echo "  Domain : $ZONE_NAME"
          echo "  Vercel : ZERO"
          echo "══════════════════════════════════════════════════"
