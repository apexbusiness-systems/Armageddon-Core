name: Armageddon CI

on:
  push:
    branches: ["main", "refactor/*", "claude/*", "feat/*", "fix/*"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Verify Shared Lib Build
        run: ls -F packages/shared/dist/

      - name: Build Core
        run: npm run build -w armageddon-core

      - name: Build Site
        run: npm run build -w armageddon-site
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder-key' }}

      # ── Tests ─────────────────────────────────────────────────────────────────────
      - name: Unit Tests — Core
        run: npm run test -w armageddon-core -- --reporter=verbose
        env:
          NODE_ENV: test
          SIM_MODE: "true"
          SANDBOX_TENANT: "ci-sandbox"

      - name: Unit Tests — Site
        run: npm run test -w armageddon-site -- --reporter=verbose

      # ── Type Checks ─────────────────────────────────────────────────────────────
      - name: Type Check — Core
        run: npm run typecheck -w armageddon-core

      - name: Type Check — Site
        run: npm run typecheck -w armageddon-site

      # ── Linting ─────────────────────────────────────────────────────────────────────
      - name: Lint — Core
        run: npm run lint -w armageddon-core

      - name: Lint — Site
        run: npm run lint -w armageddon-site

      # ── Security ───────────────────────────────────────────────────────────────────
      - name: npm Audit Check
        run: node scripts/audit-check.js
        continue-on-error: true
