name: Cloudflare/Local CI

on:
  push:
    branches: ["main", "refactor/*"]
  pull_request:
    branches: ["main"]

jobs:
  cloudflare-local-build:
    name: Cloudflare/local CI (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install Dependencies
        # --ignore-scripts blocks arbitrary lifecycle scripts from transitive
        # deps during install (supply-chain hardening); we then run only the one
        # build step we trust, which postinstall would otherwise have run.
        run: npm ci --ignore-scripts && npm run build:shared

      - name: Verify Shared Lib Build
        run: ls -F packages/shared/dist/

      - name: Build Core
        run: npm run build -w armageddon-core

      - name: Build Cloudflare/local Site
        run: npm run build -w armageddon-site
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder' }}

      # ═══════════════════════════════════════════════════════════
      # APEX-POWER ZERO-FAILURE PROTOCOL
      # ═══════════════════════════════════════════════════════════

      - name: Documentation Sync Check
        run: npm run docs:check

      - name: Lint Check (All Workspaces)
        run: npm run lint

      - name: Type Check (All Workspaces)
        run: npm run typecheck

      - name: Run Unit Tests (All Workspaces)
        run: npm run test
