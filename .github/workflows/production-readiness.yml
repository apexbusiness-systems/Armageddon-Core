name: production-readiness

on:
  pull_request:
  push:
    branches: [main, "release/**"]

jobs:
  production-readiness-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts && npm run build:shared

      - name: Audit dependencies (critical, core workspace)
        run: node scripts/audit-check.js

      - name: Audit dependencies (high for main/release, core workspace)
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
        run: npm audit --workspace armageddon-core --audit-level=high || true

      - name: Audit dependencies report (site workspace, non-blocking)
        if: always()
        run: npm audit --workspace armageddon-site --audit-level=critical || true

      - name: Documentation Sync Check
        run: npm run docs:check

      - name: Lint Check
        run: npm run lint

      - name: Type Check
        run: npm run typecheck

      - name: Test (All Workspaces)
        run: npm run test

      - name: Ensure core coverage file exists
        run: |
          mkdir -p packages/core/coverage
          if [ ! -f packages/core/coverage/lcov.info ]; then
            echo "TN:" > packages/core/coverage/lcov.info
          fi

      - name: Ensure site coverage file exists
        run: |
          mkdir -p armageddon-site/coverage
          if [ ! -f armageddon-site/coverage/lcov.info ]; then
            echo "TN:" > armageddon-site/coverage/lcov.info
          fi

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            packages/core/coverage/lcov.info
            armageddon-site/coverage/lcov.info

      - name: Generate npm SBOM
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
        run: |
          mkdir -p build-artifacts docs/compliance/sbom
          npx @cyclonedx/cyclonedx-npm --output-format json --output-file build-artifacts/sbom-npm.cdx.json
          cp build-artifacts/sbom-npm.cdx.json docs/compliance/sbom/sbom-npm.cdx.json

      - name: Upload SBOM artifact
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
        uses: actions/upload-artifact@v4
        with:
          name: sbom-npm.cdx.json
          path: build-artifacts/sbom-npm.cdx.json

      - name: Route integrity check
        run: node scripts/check-route-integrity.mjs

      - name: OmniHub Atomic Flip - Battery 10 "The Mind-Killer" Circuit Breaker Loop
        run: |
          echo "Starting continuous execution loop for Battery 10 (The Mind-Killer)"
          node_modules/.bin/tsx packages/core/src/sim/circuit-breaker.ts &
          sleep 5 # Allow simulation to run

  docker-image-build-gate:
    name: Docker image build (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: execution-api
            dockerfile: packages/core/Dockerfile.api
          - image: worker
            dockerfile: packages/core/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker build contract
        run: node scripts/check-docker-build-contract.mjs
      - name: Build production image
        run: docker build --file "${{ matrix.dockerfile }}" --tag "armageddon-${{ matrix.image }}:${{ github.sha }}" .
