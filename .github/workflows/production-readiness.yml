name: production-readiness

on:
  pull_request:
  push:
    branches: [main, "release/**"]

jobs:
  production-readiness-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node version MUST match the production Docker image (node:20-bullseye-slim).
          # Do not upgrade to 22 without also updating both Dockerfiles in the same patch.
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Audit dependencies (critical, core workspace — BLOCKING)
        run: node scripts/audit-check.js

      - name: Audit dependencies (high for main/release, core workspace — BLOCKING)
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
        # Removed || true — high-severity vulnerabilities on main/release block the gate.
        run: npm audit --workspace armageddon-core --audit-level=high

      - name: Audit dependencies report (site workspace, non-blocking informational)
        if: always()
        run: npm audit --workspace armageddon-site --audit-level=critical || true

      - name: Documentation Sync Check
        run: npm run docs:check

      - name: Docker Build Contract
        # Validates both Dockerfiles copy bundle-workflows.mjs before invoking it,
        # retain non-root users, health checks, and start.sh in Dockerfile.api CMD.
        # This must run before any Docker build attempt.
        run: npm run check:docker-contract

      - name: Lint Check
        run: npm run lint

      - name: Type Check
        run: npm run typecheck

      - name: Test (All Workspaces)
        run: npm run test

      - name: Upload coverage artifacts
        # Only upload if coverage files were actually produced by the test run.
        # The previous pattern created empty TN: LCOV files as fake coverage —
        # this masked zero-coverage states from SonarCloud.  If no coverage file
        # is present it means vitest did not run with --coverage; the missing file
        # will cause this step to upload nothing, making the gap visible.
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            packages/core/coverage/lcov.info
            armageddon-site/coverage/lcov.info
          if-no-files-found: warn

      - name: Generate npm SBOM
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
        run: |
          mkdir -p build-artifacts docs/compliance/sbom
          npx @cyclonedx/cyclonedx-npm --output-format json --output-file build-artifacts/sbom-npm.cdx.json
          cp build-artifacts/sbom-npm.cdx.json docs/compliance/sbom/sbom-npm.cdx.json

      - name: Upload SBOM artifact
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
        uses: actions/upload-artifact@v4
        with:
          name: sbom-npm.cdx.json
          path: build-artifacts/sbom-npm.cdx.json

      - name: Route integrity check
        run: node scripts/check-route-integrity.mjs

  # ── Docker image matrix build gate ──────────────────────────────────────────
  # Builds both production Docker images from a clean context on every PR and
  # push to main/release.  A Dockerfile that cannot build from source is a
  # deployment blocker and must not reach Render.
  docker-image-gate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - image: execution-api
            dockerfile: packages/core/Dockerfile.api
            label: "Execution API (api-server + worker co-located)"
          - image: worker
            dockerfile: packages/core/Dockerfile
            label: "Worker (standalone Temporal poller)"
    name: "Docker — ${{ matrix.label }}"
    steps:
      - uses: actions/checkout@v4

      - name: Docker contract check (${{ matrix.image }})
        run: node scripts/check-docker-build-contract.mjs

      - name: Build Docker image (${{ matrix.image }})
        run: |
          docker build \
            --no-cache \
            -f ${{ matrix.dockerfile }} \
            -t armageddon-${{ matrix.image }}:gate \
            .

      - name: Verify non-root runtime user (${{ matrix.image }})
        run: |
          USER=$(docker inspect armageddon-${{ matrix.image }}:gate \
            --format='{{.Config.User}}')
          echo "Runtime user: $USER"
          if [ "$USER" = "root" ] || [ -z "$USER" ]; then
            echo "FAIL: image runs as root or no USER set"
            exit 1
          fi
          echo "PASS: non-root user confirmed"

      - name: Verify compiled artifacts exist (${{ matrix.image }})
        run: |
          docker run --rm --entrypoint /bin/sh armageddon-${{ matrix.image }}:gate -c '
            set -e
            # Workflow bundle must be present and non-empty
            test -s /app/packages/core/dist/workflow-bundle.js || \
              { echo "FAIL: workflow-bundle.js missing or empty"; exit 1; }
            # Worker compiled entry point
            test -f /app/packages/core/dist/worker.js || \
              { echo "FAIL: dist/worker.js missing"; exit 1; }
            echo "PASS: all required artifacts present"
          '

      - name: node --check compiled artifacts (${{ matrix.image }})
        run: |
          docker run --rm --entrypoint /bin/sh armageddon-${{ matrix.image }}:gate -c '
            node --check /app/packages/core/dist/workflow-bundle.js && echo "PASS: workflow-bundle.js syntax OK"
          '

