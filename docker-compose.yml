# ═══════════════════════════════════════════════════════════════════════════
# ARMAGEDDON LEVEL 7 — TEMPORAL INFRASTRUCTURE
# Standalone cluster (Refactored for Persistence & Stability)
# ═══════════════════════════════════════════════════════════════════════════

services:
  # ─────────────────────────────────────────────────────────────────────────
  # POSTGRESQL — Temporal Persistence
  # ─────────────────────────────────────────────────────────────────────────
  postgresql:
    image: postgres:15-alpine
    container_name: armageddon-postgres
    command: postgres -c 'listen_addresses=*'
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-temporal}
      POSTGRES_DB: temporal
    volumes:
      - armageddon_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U temporal" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # TEMPORAL SERVER — Workflow Orchestration
  # ─────────────────────────────────────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:1.24.2
    container_name: armageddon-temporal
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-temporal}
      - POSTGRES_SEEDS=postgresql
      - DYNAMIC_CONFIG_FILE_PATH=/etc/temporal/config/dynamicconfig/development.yaml
      - SKIP_DB_CREATE=true
      - SKIP_SCHEMA_SETUP=true
      - LOG_LEVEL=debug
    volumes:
      - ./config/dynamicconfig:/etc/temporal/config/dynamicconfig
    ports:
      - "127.0.0.1:7233:7233" # gRPC - Worker connection
    healthcheck:
      test: [ "CMD", "tctl", "--address", "localhost:7233", "cluster", "health" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # TEMPORAL UI — Monitoring Dashboard
  # ─────────────────────────────────────────────────────────────────────────
  temporal-ui:
    image: temporalio/ui:2.26.2
    container_name: armageddon-temporal-ui
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # ARMAGEDDON WORKER — Adversarial Test Execution
  # NOTE: SUPABASE_SERVICE_ROLE_KEY is the canonical name.
  #       SUPABASE_SERVICE_ROLE_SECRET is accepted as a legacy alias via the
  #       shell substitution below so both naming conventions work.
  # ─────────────────────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: packages/core/Dockerfile
    container_name: armageddon-worker
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - SIM_MODE=true
      - SANDBOX_TENANT=armageddon-test
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - TEMPORAL_TASK_QUEUE=armageddon-level-7
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-${SUPABASE_SERVICE_ROLE_SECRET}}
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # ARMAGEDDON API SERVER — HTTP Certification Runtime
  # Hosts /api/run, /api/me/organizations, /api/omniport/health, etc.
  # Cloudflare Worker proxies these paths here; never on Edge (Temporal gRPC).
  # ─────────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: packages/core/Dockerfile.api
    container_name: armageddon-api
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - API_PORT=8081
      - SIM_MODE=true
      - SANDBOX_TENANT=armageddon-test
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - TEMPORAL_TASK_QUEUE=armageddon-level-7
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:-${SUPABASE_SERVICE_ROLE_SECRET}}
      - RATE_LIMIT_FAIL_OPEN=true
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ARMAGEDDON_ATTESTATION_SEED=${ARMAGEDDON_ATTESTATION_SEED:-}
    ports:
      - "127.0.0.1:8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  armageddon_postgres_data:
    name: armageddon_postgres_data
